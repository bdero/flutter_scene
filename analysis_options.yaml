include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - packages/*/build/**
    - packages/*/lib/**.g.dart
    - packages/flutter_scene/lib/src/importer/generated/**
    - packages/flutter_scene/lib/src/importer/third_party/**
    # Generated by flatc from impeller/shader_bundle/shader_bundle.fbs.
    - packages/flutter_scene/lib/src/gpu/web/shader_bundle_generated.dart
  errors:
    asset_does_not_exist: ignore
    asset_directory_does_not_exist: ignore
    invalid_dependency: ignore
