name: flutter_scene_soloud
description: SoLoud audio backend for flutter_scene. Implements the abstract audio contract from flutter_scene over the SoLoud engine via flutter_soloud.
repository: https://github.com/bdero/flutter_scene
homepage: https://github.com/bdero/flutter_scene
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.10.0
  flutter: ">=3.29.0-1.0.pre.242"

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.19.0
  flutter_soloud: ^3.3.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
