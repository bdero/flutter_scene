name: flutter_gpu_shim
description: "Web fallback shim for Flutter GPU. On Impeller platforms, re-exports package:flutter_gpu. On web, provides a WebGL2-backed implementation."
version: 0.0.1
repository: https://github.com/bdero/flutter_scene
homepage: https://github.com/bdero/flutter_scene

publish_to: none

resolution: workspace

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0-1.0.pre.242"

dependencies:
  flutter:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  vector_math: ^2.1.4
  web: ^1.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
