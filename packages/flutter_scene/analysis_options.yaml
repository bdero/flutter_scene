include: package:flutter_lints/flutter.yaml

# Package-level analysis settings. The workspace root has its own
# analysis_options.yaml, but that file is not shipped inside the published
# package, so the generated/vendored excludes are duplicated here to keep the
# published package analyzing clean (pub.dev / pana run analysis on the package
# in isolation).
analyzer:
  exclude:
    # Generated by flatc from impeller/shader_bundle/shader_bundle.fbs.
    - lib/src/gpu/web/shader_bundle_generated.dart
    # Generated / vendored flatbuffers for the .model importer.
    - lib/src/importer/generated/**
    - lib/src/importer/third_party/**
  errors:
    asset_does_not_exist: ignore
    asset_directory_does_not_exist: ignore
    invalid_dependency: ignore
