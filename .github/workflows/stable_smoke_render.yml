name: stable smoke render

# Renders the smoke scenes for flutter_scene's stable branch against Flutter's
# current 3.45 candidate branch and uploads them to Argos under stable-specific
# build names, so stable baselines are tracked separately from the Flutter
# master-channel smoke renders.

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *" # daily, 07:30 UTC
  push:
    branches: [stable]
  pull_request:
    branches: [stable]

# A new push to a branch or PR supersedes its still-running render.
concurrency:
  group: stable-smoke-render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: stable_linux (Flutter 3.45)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # No GPU on the runner; force Mesa's software rasterizers (GL llvmpipe,
      # Vulkan lavapipe) so Impeller has a backend under Xvfb.
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        with:
          ref: stable
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - name: Flutter and engine revision
        run: flutter --version
      - name: Install Linux desktop build deps + software GL/Vulkan + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            xvfb libgl1-mesa-dri libegl-mesa0 libgles2 mesa-vulkan-drivers
      - run: flutter config --enable-linux-desktop --enable-native-assets
      - run: flutter pub get
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: >
          xvfb-run -a -s "-screen 0 1280x1024x24"
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/smoke_test.dart
          -d linux --enable-impeller --enable-flutter-gpu
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export ARGOS_BRANCH=stable
            export ARGOS_COMMIT="$(git rev-parse HEAD)"
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name stable_linux --reference-branch stable 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (stable_linux, Flutter 3.45). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  web:
    name: stable_web (Flutter 3.45)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        with:
          ref: stable
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-native-assets
      - run: flutter pub get
      - uses: nanasess/setup-chromedriver@v2
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: |
          chromedriver --port=4444 &
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server --browser-name=chrome --headless --driver-port=4444
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export ARGOS_BRANCH=stable
            export ARGOS_COMMIT="$(git rev-parse HEAD)"
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name stable_web --reference-branch stable 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (stable_web, Flutter 3.45). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true
