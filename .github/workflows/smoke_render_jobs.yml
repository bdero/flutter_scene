name: smoke render jobs

on:
  workflow_call:
    inputs:
      flutter_channel:
        required: true
        type: string
      label:
        required: true
        type: string
      argos_prefix:
        required: false
        type: string
        default: ""
      reference_branch:
        required: false
        type: string
        default: ""
      checkout_ref:
        required: false
        type: string
        default: ""
      upload_argos_on_push:
        description: >
          Upload rendered frames to Argos on push events. Set false to save
          Argos quota on master-push runs; pull-request, scheduled (nightly),
          and manual runs always upload regardless.
        required: false
        type: boolean
        default: true
    secrets:
      ARGOS_TOKEN:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  linux:
    name: ${{ inputs.argos_prefix }}linux (${{ inputs.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # No GPU on the runner; force Mesa's software rasterizers (GL llvmpipe,
      # Vulkan lavapipe) so Impeller has a backend under Xvfb.
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
    steps:
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref != '' }}
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref == '' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel }}
      - name: Flutter and engine revision
        run: flutter --version
      - name: Install Linux desktop build deps + software GL/Vulkan + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            xvfb libgl1-mesa-dri libegl-mesa0 libgles2 mesa-vulkan-drivers
      - run: flutter config --enable-linux-desktop --enable-native-assets
      - run: flutter pub get
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: >
          xvfb-run -a -s "-screen 0 1280x1024x24"
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/smoke_test.dart
          -d linux --enable-impeller --enable-flutter-gpu
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() && (github.event_name != 'push' || inputs.upload_argos_on_push) }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          # Never upload an empty/partial build: a failed render must not
          # overwrite the Argos baseline (see the android job, and
          # notes/ci/argos_visual_baseline_tracking.md).
          if [ ! -d build/smoke ] || ! find build/smoke -type f -name '*.png' | grep -q .; then
            echo "No smoke screenshots found; skipping Argos upload."
            exit 0
          fi
          reference_args=()
          if [ -n "${{ inputs.reference_branch }}" ]; then
            reference_args=(--reference-branch "${{ inputs.reference_branch }}")
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              export ARGOS_BRANCH="${{ inputs.reference_branch }}"
              export ARGOS_COMMIT="$(git rev-parse HEAD)"
            fi
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name "${{ inputs.argos_prefix }}linux" "${reference_args[@]}" 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (${{ inputs.argos_prefix }}linux, ${{ inputs.label }}). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  android:
    name: ${{ inputs.argos_prefix }}android_${{ matrix.backend }} (${{ inputs.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: gles
            expected_backend: opengles
            emulator_options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          - backend: vulkan
            expected_backend: vulkan
            emulator_options: -no-window -gpu swiftshader -no-snapshot -noaudio -no-boot-anim -camera-back none
    steps:
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref != '' }}
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref == '' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel }}
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-native-assets
      - run: flutter pub get
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Render smoke scenes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: ${{ matrix.emulator_options }}
          script: >
            flutter devices &&
            (adb shell getprop ro.hardware.vulkan || true) &&
            (adb shell getprop ro.opengles.version || true) &&
            adb shell svc power stayon true &&
            (adb shell wm dismiss-keyguard || true) &&
            mkdir -p examples/smoke_render/build/android-diagnostics &&
            (adb devices -l > examples/smoke_render/build/android-diagnostics/adb_devices_before_${{ matrix.backend }}.txt 2>&1 || true) &&
            (adb shell getprop > examples/smoke_render/build/android-diagnostics/getprop_${{ matrix.backend }}.txt 2>&1 || true) &&
            (adb shell dumpsys SurfaceFlinger > examples/smoke_render/build/android-diagnostics/surfaceflinger_${{ matrix.backend }}.txt 2>&1 || true) &&
            adb logcat -c &&
            (adb logcat -v time > examples/smoke_render/build/android-diagnostics/logcat_${{ matrix.backend }}.txt 2>&1 & echo $! > /tmp/smoke-logcat.pid) &&
            cd examples/smoke_render &&
            (flutter drive
            --flavor ${{ matrix.backend }}
            --driver=test_driver/integration_test.dart
            --target=integration_test/smoke_test.dart
            -d emulator-5554
            --dart-define=SMOKE_EXPECTED_ANDROID_IMPELLER_BACKEND=${{ matrix.expected_backend }}
            --enable-impeller
            --enable-flutter-gpu;
            status=$?;
            (adb devices -l > build/android-diagnostics/adb_devices_after_${{ matrix.backend }}.txt 2>&1 || true);
            kill "$(cat /tmp/smoke-logcat.pid)" || true;
            exit "$status")
      - name: Upload Android diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: android-diagnostics-${{ inputs.argos_prefix }}android_${{ matrix.backend }}
          path: examples/smoke_render/build/android-diagnostics
          if-no-files-found: ignore
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() && (github.event_name != 'push' || inputs.upload_argos_on_push) }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          # Never upload an empty/partial build: a failed render must not
          # overwrite the Argos baseline (see
          # notes/ci/argos_visual_baseline_tracking.md).
          if [ ! -d build/smoke ] || ! find build/smoke -type f -name '*.png' | grep -q .; then
            echo "No smoke screenshots found; skipping Argos upload."
            exit 0
          fi
          reference_args=()
          if [ -n "${{ inputs.reference_branch }}" ]; then
            reference_args=(--reference-branch "${{ inputs.reference_branch }}")
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              export ARGOS_BRANCH="${{ inputs.reference_branch }}"
              export ARGOS_COMMIT="$(git rev-parse HEAD)"
            fi
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name "${{ inputs.argos_prefix }}android_${{ matrix.backend }}" "${reference_args[@]}" 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (${{ inputs.argos_prefix }}android_${{ matrix.backend }}, ${{ inputs.label }}). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  web:
    name: ${{ inputs.argos_prefix }}web (${{ inputs.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref != '' }}
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref == '' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel }}
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-native-assets
      - run: flutter pub get
      - uses: nanasess/setup-chromedriver@v3
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: |
          chromedriver --port=4444 &
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server --browser-name=chrome --headless --driver-port=4444
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() && (github.event_name != 'push' || inputs.upload_argos_on_push) }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          # Never upload an empty/partial build: a failed render must not
          # overwrite the Argos baseline (see the android job, and
          # notes/ci/argos_visual_baseline_tracking.md).
          if [ ! -d build/smoke ] || ! find build/smoke -type f -name '*.png' | grep -q .; then
            echo "No smoke screenshots found; skipping Argos upload."
            exit 0
          fi
          reference_args=()
          if [ -n "${{ inputs.reference_branch }}" ]; then
            reference_args=(--reference-branch "${{ inputs.reference_branch }}")
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              export ARGOS_BRANCH="${{ inputs.reference_branch }}"
              export ARGOS_COMMIT="$(git rev-parse HEAD)"
            fi
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name "${{ inputs.argos_prefix }}web" "${reference_args[@]}" 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (${{ inputs.argos_prefix }}web, ${{ inputs.label }}). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  windows:
    name: ${{ inputs.argos_prefix }}windows (${{ inputs.label }})
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref != '' }}
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/checkout@v7
        if: ${{ inputs.checkout_ref == '' }}
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel }}
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-windows-desktop --enable-native-assets
      - run: flutter pub get
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        # No GPU on the runner. Windows Impeller renders through ANGLE, which
        # falls back to the D3D11 WARP software rasterizer when no hardware
        # adapter is present, so no extra graphics setup is needed (unlike the
        # Linux job, which installs Mesa's software GL/Vulkan).
        run: >
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/smoke_test.dart
          -d windows --enable-impeller --enable-flutter-gpu
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() && (github.event_name != 'push' || inputs.upload_argos_on_push) }}
        working-directory: examples/smoke_render
        shell: bash
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          # Never upload an empty/partial build: a failed render must not
          # overwrite the Argos baseline (see the android job, and
          # notes/ci/argos_visual_baseline_tracking.md).
          if [ ! -d build/smoke ] || ! find build/smoke -type f -name '*.png' | grep -q .; then
            echo "No smoke screenshots found; skipping Argos upload."
            exit 0
          fi
          reference_args=()
          if [ -n "${{ inputs.reference_branch }}" ]; then
            reference_args=(--reference-branch "${{ inputs.reference_branch }}")
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              export ARGOS_BRANCH="${{ inputs.reference_branch }}"
              export ARGOS_COMMIT="$(git rev-parse HEAD)"
            fi
          fi
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name "${{ inputs.argos_prefix }}windows" "${reference_args[@]}" 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (${{ inputs.argos_prefix }}windows, ${{ inputs.label }}). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true
