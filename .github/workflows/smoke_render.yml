name: smoke render

# Renders a small set of deterministic scenes against the latest Flutter master
# and uploads the frames to Argos for visual diffing. Catches rendering
# regressions (black screen / nothing drawn / unlit) that crash tests miss.
# Runs on pull requests and pushes to master, so Argos diffs each PR against
# the master baseline, plus manually and daily. Notifies Discord when a
# non-PR run fails.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # daily, 07:00 UTC
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A new push to a branch or PR supersedes its still-running render.
concurrency:
  group: smoke-render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux (Flutter master)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # No GPU on the runner; force Mesa's software rasterizers (GL llvmpipe,
      # Vulkan lavapipe) so Impeller has a backend under Xvfb.
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: master
      - name: Flutter and engine revision
        run: flutter --version
      - name: Install Linux desktop build deps + software GL/Vulkan + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            xvfb libgl1-mesa-dri libegl-mesa0 libgles2 mesa-vulkan-drivers
      - run: flutter config --enable-linux-desktop --enable-native-assets
      - run: flutter pub get
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: >
          xvfb-run -a -s "-screen 0 1280x1024x24"
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/smoke_test.dart
          -d linux --enable-impeller --enable-flutter-gpu
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name linux 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (linux, Flutter master). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  android_gles:
    name: android_gles (Flutter acd5e1a)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Current Flutter master has a GLES Texture.overwrite raster-thread
      # submission regression after flutter/flutter#185890. Pin Android GLES
      # smoke goldens before that change until the upstream regression is fixed.
      FLUTTER_REVISION: acd5e1a75afd78b6851315652edce6d8e34fbbe9
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Flutter
        run: |
          git clone --filter=blob:none https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          git -C "$RUNNER_TEMP/flutter" checkout "$FLUTTER_REVISION"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-native-assets
      - run: flutter pub get
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Render smoke scenes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: >
            flutter devices &&
            adb shell svc power stayon true &&
            (adb shell wm dismiss-keyguard || true) &&
            cd examples/smoke_render &&
            flutter drive
            --driver=test_driver/integration_test.dart
            --target=integration_test/smoke_test.dart
            -d emulator-5554
            --enable-impeller
            --enable-flutter-gpu
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name android_gles 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (android_gles, Flutter acd5e1a). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true

  web:
    name: web (Flutter master)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: master
      - name: Flutter and engine revision
        run: flutter --version
      - run: flutter config --enable-native-assets
      - run: flutter pub get
      - uses: nanasess/setup-chromedriver@v2
      - name: Render smoke scenes
        working-directory: examples/smoke_render
        run: |
          chromedriver --port=4444 &
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server --browser-name=chrome --headless --driver-port=4444
      - name: Upload to Argos
        id: argos
        if: ${{ !cancelled() }}
        working-directory: examples/smoke_render
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          out=$(npx --yes @argos-ci/cli upload build/smoke --build-name web 2>&1) || true
          echo "$out"
          url=$(printf '%s' "$out" | grep -oE 'https://app\.argos-ci\.com/[^[:space:]]+' | head -1)
          echo "build_url=$url" >> "$GITHUB_OUTPUT"
      - name: Notify Discord on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARGOS_URL: ${{ steps.argos.outputs.build_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          CONTENT="Smoke render failed (web, Flutter master). Run: $RUN_URL"
          [ -n "$ARGOS_URL" ] && CONTENT="$CONTENT  |  Argos: $ARGOS_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$CONTENT\"}" "$DISCORD_WEBHOOK_URL" || true
