include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # flatc-generated reader for the Shaders tab.
    - lib/src/shader_bundle_generated.dart
    - build/**
    - android/**
    - ios/**
    - web/**
    - windows/**
    - macos/**
    - linux/**

linter:
  rules:
    # This dev-only smoke app intentionally imports flutter_scene's internal
    # GPU shim (package:flutter_scene/src/gpu/gpu.dart) to exercise the
    # low-level WebGL2 backend in isolation.
    implementation_imports: false
