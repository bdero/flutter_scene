name: flutter_gpu_shim_smoke
description: "Smoke test for flutter_gpu_shim's WebGL2 -> ui.Image surface bridge."
publish_to: 'none'

version: 0.0.1

resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  # The GPU shim now lives inside flutter_scene (lib/src/gpu). This dev-only
  # smoke app reaches into that internal library directly; implementation_imports
  # is disabled in analysis_options.yaml for that reason.
  flutter_scene: ^0.18.0
  flat_buffers: ^25.9.23
  vector_math: ^2.1.4
  web: ^1.1.0

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/base.shaderbundle
