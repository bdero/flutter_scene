name: example_app
description: "flutter_scene example project."
publish_to: 'none'

version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.11.0
  flutter_scene_importer: ^0.11.0
  hooks: ^1.0.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/little_paris_eiffel_tower.png
    - assets/little_paris_eiffel_tower_irradiance.png
    # Imported models.
    - build/models/
    # Source .glb files for the runtime importer demo.
    - assets_src/
