name: example_app
description: "flutter_scene example project."
publish_to: 'none'

version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_gpu_shaders: ^0.5.0
  flutter_scene: ^0.17.0
  # Native Rapier physics backend, used by the Physics example. Pulls
  # in a Rust build hook, so building this app now requires cargo.
  flutter_scene_rapier:
    path: ../../packages/flutter_scene_rapier
  hooks: ^2.0.0
  http: ^1.2.0
  path_provider: ^2.1.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/little_paris_eiffel_tower.png
    # Imported models are registered as DataAssets by buildModels (loaded via
    # loadModel); no pubspec entry is needed. Requires Dart data assets
    # (flutter config --enable-dart-data-assets).
    # Source .glb files for the runtime importer demo.
    - assets_src/
    # Custom shader bundle for the raw-ShaderMaterial toon example.
    - build/shaderbundles/example.shaderbundle
    # .fmat custom-material bundle and its parameter sidecar, for the
    # "Toon (.fmat)" example (built by buildMaterials in hook/build.dart).
    - build/shaderbundles/materials.shaderbundle
    - build/shaderbundles/materials.fmat.json
