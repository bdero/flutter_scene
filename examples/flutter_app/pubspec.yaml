name: example_app
description: "flutter_scene example project."
publish_to: 'none'

version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_gpu_shaders: ^0.5.1
  flutter_scene: ^0.19.0
  # Native Rapier physics backend, used by the Physics example. Pulls
  # in a Rust build hook, so building this app now requires cargo.
  flutter_scene_rapier:
    path: ../../packages/flutter_scene_rapier
  # SoLoud audio backend, used by the Audio example.
  flutter_scene_soloud:
    path: ../../packages/flutter_scene_soloud
  # box3d physics backend, used by the Physics (box3d) example. Compiles
  # box3d from source through a C build hook.
  flutter_scene_box3d:
    path: ../../packages/flutter_scene_box3d
  hooks: ^2.0.0
  http: ^1.2.0
  # Extracts the .tar.gz of reference DICOM slices for the DICOM Volume example.
  archive: ^4.0.0
  path_provider: ^2.1.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/little_paris_eiffel_tower.png
    # Generated test tones for the Audio example.
    - assets/sounds/
    # Imported scenes are registered as DataAssets by buildScenes (loaded via
    # loadScene); no pubspec entry is needed. Requires Dart data assets
    # (flutter config --enable-dart-data-assets).
    # Source .glb files for the runtime importer demo.
    - assets_src/
    # Custom shader bundle for the raw-ShaderMaterial toon example.
    - build/shaderbundles/example.shaderbundle
    # .fmat custom-material bundle and its parameter sidecar, for the
    # "Toon (.fmat)" example (built by buildMaterials in hook/build.dart).
    - build/shaderbundles/materials.shaderbundle
    - build/shaderbundles/materials.fmat.json
